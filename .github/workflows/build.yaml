# https://lgug2z.com/articles/building-and-privately-caching-x86-and-aarch64-nixos-systems-on-github-actions/
name: "build"
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  contents: read
  pull-requests: write
  models: read
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [flake-check, framework, nas, vps]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20
      - uses: docker/setup-qemu-action@v3
      - run: |
          sudo mkdir -p /etc/nix
          echo "machine cache.lorenzbischof.com password ${{ secrets.ATTIC_TOKEN }}" | sudo tee /etc/nix/netrc > /dev/null
      - uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: holster
      - uses: cachix/install-nix-action@v31
        with:
          # We set our custom GitHub token for any private flake inputs we might have
          github_access_token: ${{ secrets.GH_TOKEN }}
          extra_nix_config: |
            fallback = true
            http-connections = 128
            max-substitution-jobs = 128
            extra-platforms = aarch64-linux
            substituters = https://cache.lorenzbischof.com/system?priority=42 https://cache.nixos.org/
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= system:DAJL6xmsmoUmZOeGL8XxrEWF5pdtFGMW2+cOGyYaqgU=
      - name: Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:cicd
          use-cache: 'true'
      - name: Build
        id: build
        run: |
          set +e
          if [ "${{ matrix.target }}" = "flake-check" ]; then
            nix flake check 2>&1 | tee build.log
            exit_code=${PIPESTATUS[0]}
          else
            nix run nixpkgs#attic-client login cache https://cache.lorenzbischof.com ${{ secrets.ATTIC_TOKEN }}
            nix build .#nixosConfigurations.${{ matrix.target }}.config.system.build.toplevel 2>&1 | tee build.log
            exit_code=${PIPESTATUS[0]}
            if [ $exit_code -eq 0 ]; then
              nix run nixpkgs#attic-client push system result
            fi
          fi
          exit $exit_code
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.target }}
          path: build.log

  analyze-claude:
    needs: build
    if: ${{ github.event_name == 'pull_request' && failure() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GH_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          pattern: build-log-*
          path: build-logs
      - name: Load prompt
        id: prompt
        run: |
          {
            echo 'content<<PROMPT_EOF'
            cat .github/prompts/analyze-nix-failure.md
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Analyze failure with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: ${{ steps.prompt.outputs.content }}
      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f analysis.md ]; then
            gh pr comment "${{ github.event.pull_request.number }}" \
              --body-file analysis.md \
              --repo "${{ github.repository }}"
          fi

  analyze-codex:
    needs: build
    if: ${{ github.event_name == 'pull_request' && failure() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GH_TOKEN }}
      - uses: actions/download-artifact@v4
        with:
          pattern: build-log-*
          path: build-logs
      - name: Analyze failure with Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/prompts/analyze-nix-failure.md
          sandbox: workspace-write
          output-file: analysis.md
          codex-args: "--full-auto"
      - name: Comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f analysis.md ]; then
            gh pr comment "${{ github.event.pull_request.number }}" \
              --body-file analysis.md \
              --repo "${{ github.repository }}"
          fi

  failure-alert:
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ cancelled() || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'failure') }}
    steps:
      - name: Conditionally Fail Required Check
        shell: bash
        run: |
          echo "::error Some required job has failed!"
          exit 1
